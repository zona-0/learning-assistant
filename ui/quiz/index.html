<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleverAI — Quiz AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>

  <div class="bg-layer">
    <canvas id="bgCanvas"></canvas>
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <div class="mob-overlay" id="mob-overlay" onclick="closeMobSidebar()"></div>
  <div class="layout" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-top">
        <div class="sb-brand" id="sb-brand">
          <svg viewBox="0 0 40 40" fill="none" width="24" height="24" class="sb-logo">
            <rect x="6" y="5" width="20" height="28" rx="3" fill="none" stroke="#06b6d4" stroke-width="1.8"/>
            <rect x="8" y="7" width="16" height="24" rx="2" fill="rgba(6,182,212,0.08)"/>
            <line x1="11" y1="12" x2="21" y2="12" stroke="#67e8f9" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="11" y1="16" x2="21" y2="16" stroke="#67e8f9" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="11" y1="20" x2="18" y2="20" stroke="#67e8f9" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M6 28 Q14 32 26 28" stroke="#06b6d4" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <circle cx="30" cy="28" r="7" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.4"/>
            <path d="M27.5 28 L29.5 30 L33 26" stroke="#a5f3fc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="sb-name">CleverAI</span>
        </div>
        <button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" id="toggle-ico">
            <line x1="3" y1="5" x2="17" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <nav class="sb-nav">
        <a href="../dashboard/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">Dashboard</span>
        </a>
        <a href="../pomodoro/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10" y1="5" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="10" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="sb-label">Pomodoro</span>
        </a>
        <a href="../note/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="6" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <line x1="6" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="sb-label">Notes</span>
        </a>
        <a href="../quiz/index.html" class="sb-item active">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <rect x="2" y="5" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 10L8 12L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="sb-label">Quiz AI</span>
        </a>
        <a href="../aitutor/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <circle cx="10" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 18C4 15 6.7 13 10 13C13.3 13 16 15 16 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="sb-label">AI Tutor</span>
        </a>
        <a href="../profile/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16" class="sb-ico">
            <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 18C3 14.7 6.1 12 10 12C13.9 12 17 14.7 17 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="sb-label">Profile</span>
        </a>
      </nav>

      <div class="sb-foot">
        <button class="sb-logout" onclick="doLogout()">
          <svg viewBox="0 0 20 20" fill="none" width="15" height="15" class="sb-ico">
            <path d="M8 3L3 3L3 17L8 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 7L17 10L12 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="17" y1="10" x2="7" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="sb-label">Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main-wrap">

      <!-- HEADER -->
      <header class="header">
        <button class="mob-menu-btn" onclick="openMobSidebar()">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
            <line x1="3" y1="5" x2="17" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="header-left">
          <svg viewBox="0 0 20 20" fill="none" width="18" height="18" style="color:#f59e0b;flex-shrink:0">
            <rect x="2" y="5" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 10L8 12L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h1 class="header-title">Quiz AI</h1>
        </div>
        <div class="header-right">
          <div class="user-pill">
            <div class="ua" id="ua">AC</div>
            <div class="ua-info">
              <p class="ua-name" id="udisplay">User</p>
              <p class="ua-role" id="urole">Pelajar</p>
            </div>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <div class="quiz-scroll" id="quizScroll">
        <div class="quiz-container">

          <!-- SETUP SCREEN -->
          <div class="quiz-setup" id="quizSetup">
            <div class="qs-card">
              <div class="qs-icon">
                <svg viewBox="0 0 24 24" fill="none" width="32" height="32">
                  <rect x="3" y="6" width="18" height="15" rx="2.5" stroke="#06b6d4" stroke-width="1.8"/>
                  <path d="M8 12L10 14L16 9" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <h2 class="qs-title">Start a New Quiz</h2>
              <p class="qs-sub">Pick a topic and number of questions. Questions are generated by AI.</p>

              <div class="qs-field">
                <label class="qs-label">Topic</label>
                <input type="text" class="qs-input" id="topicInput" placeholder="e.g. Mathematics, Biology, History..." />
              </div>

              <div class="qs-field">
                <label class="qs-label">Number of Questions</label>
                <div class="qs-count">
                  <button class="qs-count-btn" onclick="adjustCount(-1)">−</button>
                  <span class="qs-count-num" id="qCount">5</span>
                  <button class="qs-count-btn" onclick="adjustCount(1)">+</button>
                </div>
              </div>

              <button class="qs-start-btn" onclick="startQuiz()">
                <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                  <path d="M4 4L16 10L4 16V4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                <span>Generate Quiz</span>
              </button>
            </div>
          </div>

          <!-- QUIZ SCREEN -->
          <div class="quiz-screen" id="quizScreen" style="display:none">

            <!-- Progress -->
            <div class="quiz-progress" id="quizProgress">
              <div class="qp-top">
                <span class="qp-topic" id="qpTopic">Topic</span>
                <span class="qp-score" id="qpScore">0 / 0</span>
              </div>
              <div class="qp-bar"><div class="qp-fill" id="qpFill" style="width:0%"></div></div>
            </div>

            <!-- Question -->
            <div class="q-card" id="qCard">
              <div class="q-num" id="qNum">Question 1</div>
              <p class="q-text" id="qText">Loading question...</p>
              <div class="q-options" id="qOptions"></div>
            </div>
          </div>

          <!-- RESULTS SCREEN -->
          <div class="result-screen" id="resultScreen" style="display:none">
            <div class="rs-card">
              <div class="rs-icon" id="rsIcon">
                <svg viewBox="0 0 24 24" fill="none" width="40" height="40">
                  <circle cx="12" cy="12" r="9" stroke="#06b6d4" stroke-width="1.8"/>
                  <path d="M8 12L11 15L16 9" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <h2 class="rs-title" id="rsTitle">Quiz Complete!</h2>
              <div class="rs-score-wrap">
                <span class="rs-score" id="rsScore">0</span>
                <span class="rs-total" id="rsTotal">/ 0</span>
              </div>
              <p class="rs-pct" id="rsPct">0%</p>
              <p class="rs-msg" id="rsMsg">Great effort!</p>
              <div class="rs-actions">
                <button class="rs-btn primary" onclick="startQuiz()">Try Again</button>
                <button class="rs-btn ghost" onclick="backToSetup()">New Topic</button>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
