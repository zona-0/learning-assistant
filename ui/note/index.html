<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleverAI • Notes</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Quill -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="note.css">
</head>
<body class="dark">

  <!-- BACKGROUND -->
  <div class="bg-layer">
    <div class="grid-overlay"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <div class="mob-overlay" id="mob-overlay" onclick="closeMob()"></div>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <div class="sb-top">
        <div class="sb-brand">
          <svg viewBox="0 0 40 40" width="26" height="26" fill="none">
            <rect x="6" y="5" width="20" height="28" rx="3" stroke="currentColor" stroke-width="1.8"/>
            <rect x="8" y="7" width="16" height="24" rx="2" fill="rgba(6,182,212,0.08)"/>
            <line x1="11" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.4"/>
            <line x1="11" y1="16" x2="21" y2="16" stroke="currentColor" stroke-width="1.4"/>
            <line x1="11" y1="20" x2="18" y2="20" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="30" cy="28" r="7" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span class="sb-name">CleverAI</span>
        </div>

        <button class="sb-toggle" onclick="toggleSidebar()">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <line x1="3" y1="5" x2="17" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <nav class="sb-nav">

        <a href="../dashboard/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">Dashboard</span>
        </a>

        <a href="../pomodoro/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10" y1="5" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">Pomodoro</span>
        </a>

        <a href="../note/index.html" class="sb-item active">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="6" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.3"/>
            <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.3"/>
            <line x1="6" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span class="sb-label">Notes</span>
        </a>

        <a href="../quiz/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <rect x="2" y="5" width="16" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 10L8 12L14 7" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">Quiz AI</span>
        </a>

        <a href="../aitutor/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <circle cx="10" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 18C4 15 6.7 13 10 13C13.3 13 16 15 16 18" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">AI Tutor</span>
        </a>

        <a href="../profile/index.html" class="sb-item">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 18C3 14.7 6.1 12 10 12C13.9 12 17 14.7 17 18" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="sb-label">Profile</span>
        </a>

      </nav>

    </aside>

    <!-- MAIN -->
    <div class="main-wrap">

      <!-- HEADER -->
      <header class="header">

        <button class="mob-btn" onclick="openMob()">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
            <line x1="3" y1="5" x2="17" y2="5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>

        <div class="header-left">
          <h1 class="header-title">Notes Workspace</h1>
        </div>

        <div class="header-right">

          <!-- THEME TOGGLE -->
          <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
            <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
              <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/>
              <line x1="10" y1="1.5" x2="10" y2="4" stroke="currentColor" stroke-width="1.5"/>
              <line x1="10" y1="16" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.5"/>
              <line x1="1.5" y1="10" x2="4" y2="10" stroke="currentColor" stroke-width="1.5"/>
              <line x1="16" y1="10" x2="18.5" y2="10" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>

          <!-- NEW NOTE -->
          <button class="btn-create" onclick="createNewNote()">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
              <line x1="10" y1="4" x2="10" y2="16" stroke="currentColor" stroke-width="1.8"/>
              <line x1="4" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span>New Note</span>
          </button>

        </div>
      </header>

      <!-- CONTENT -->
      <div class="content-scroll">
        <div class="notes-container">

          <!-- SEARCH -->
          <div class="search-bar">

            <div class="search-input-wrap">
              <svg viewBox="0 0 20 20" width="16" height="16" fill="none">
                <circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 12L17 17" stroke="currentColor" stroke-width="1.5"/>
              </svg>

              <input
                type="text"
                id="search-input"
                class="search-input"
                placeholder="Search notes..."
              />
            </div>

          </div>

          <!-- NOTES -->
          <div id="notes-grid" class="notes-grid"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- NOTE MODAL -->
  <div id="noteEditorModal" class="modal-overlay">

    <div class="note-editor-modal">

      <!-- TITLE -->
      <div class="editor-header">
        <input
          type="text"
          id="noteTitle"
          placeholder="Untitled Note"
        />

        <button onclick="closeNoteEditor()" class="modal-close">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <line x1="5" y1="5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5"/>
            <line x1="15" y1="5" x2="5" y2="15" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>

      <!-- QUILL TOOLBAR -->
      <div id="editor-toolbar">
        <span class="ql-formats">
          <select class="ql-header">
            <option selected></option>
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
          </select>
        </span>

        <span class="ql-formats">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
          <button class="ql-strike"></button>
        </span>

        <span class="ql-formats">
          <select class="ql-color"></select>
          <select class="ql-background"></select>
        </span>

        <span class="ql-formats">
          <button class="ql-list" value="ordered"></button>
          <button class="ql-list" value="bullet"></button>
        </span>

        <span class="ql-formats">
          <button class="ql-blockquote"></button>
          <button class="ql-link"></button>
          <button class="ql-clean"></button>
        </span>
      </div>

      <!-- EDITOR -->
      <div id="noteContentEditor"></div>

      <!-- FOOTER -->
      <div class="editor-footer">
        <button class="btn-ghost" onclick="closeNoteEditor()">
          Cancel
        </button>

        <button class="btn-primary" onclick="saveNote()">
          Save Note
        </button>
      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- QUILL -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

  <!-- APP -->
  <script src="note.js"></script>
</body>
</html>
